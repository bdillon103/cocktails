<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamlet & Ghost — Spec Sheet Export</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300;1,9..40,400;1,9..40,500;1,9..40,700&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400;500;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1812; --ink-mid: #4a4640; --ink-light: #8a8680; --ink-ghost: #c8c4bc;
    --parchment: #f5f2ec; --parchment-dark: #ede9e0;
    --accent: #c8392b;
    --border: rgba(26,24,18,0.1); --border-mid: rgba(26,24,18,0.2);
    --radius: 6px; --radius-lg: 10px;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--parchment); color: var(--ink); font-family: var(--sans); font-size: 14px; min-height: 100vh; }

  /* NAV */
  .nav { background: var(--ink); padding: 0 2rem; display: flex; align-items: center; height: 52px; border-bottom: 2px solid var(--accent); }
  .nav-brand { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--parchment); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 2rem; }
  .nav-brand span { color: var(--accent); }
  .nav-links { display: flex; flex: 1; }
  .nav-link { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--ink-ghost); letter-spacing: 0.06em; text-transform: uppercase; padding: 0 1rem; height: 52px; display: flex; align-items: center; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s; white-space: nowrap; text-decoration: none; }
  .nav-link:hover { color: var(--parchment); }
  .nav-link.active { color: var(--parchment); border-bottom-color: var(--accent); }

  /* PREVIEW UI */
  .preview-ui { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }
  .ui-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 1rem; }
  .ui-title { font-family: var(--mono); font-size: 22px; font-weight: 500; letter-spacing: -0.02em; }
  .ui-sub { font-size: 13px; color: var(--ink-light); margin-top: 3px; }
  .card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 1rem; }
  .btn { height: 34px; border: 1px solid var(--border-mid); border-radius: var(--radius); padding: 0 14px; font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; background: var(--parchment); color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; text-decoration: none; white-space: nowrap; }
  .btn:hover { background: var(--parchment-dark); }
  .btn-primary { background: var(--ink); color: var(--parchment); border-color: var(--ink); }
  .btn-primary:hover { background: var(--ink-mid); }
  .btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-accent:hover { background: #a82e22; }

  /* SECTION ORDER */
  .section-list { display: flex; flex-direction: column; gap: 6px; }
  .section-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: white; }
  .section-handle { color: var(--ink-ghost); font-size: 14px; cursor: grab; }
  .section-name { font-size: 13px; font-weight: 500; flex: 1; }
  .section-count { font-family: var(--mono); font-size: 11px; color: var(--ink-light); }
  .section-toggle { width: 28px; height: 16px; background: var(--ink); border-radius: 8px; position: relative; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
  .section-toggle.off { background: var(--ink-ghost); }
  .section-toggle::after { content: ''; position: absolute; width: 12px; height: 12px; background: white; border-radius: 50%; top: 2px; right: 2px; transition: right 0.15s; }
  .section-toggle.off::after { right: auto; left: 2px; }

  /* PREVIEW IFRAME AREA */
  .preview-frame { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .preview-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--parchment-dark); }
  .preview-tab { padding: 8px 16px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-light); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s; }
  .preview-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
  .preview-content { padding: 0; }

  /* ── SPEC SHEET PRINT STYLES ────────────────────────────── */
  /* These only apply inside the preview/print area */
  .spec-wrap { font-family: var(--sans); color: #1a1812; }

  /* PAGE */
  .spec-page {
    width: 8.5in;
    min-height: 11in;
    padding: 0.6in 0.65in;
    background: white;
    position: relative;
    margin: 0 auto;
  }
  .spec-page + .spec-page { border-top: 3px dashed #ddd; }

  /* COVER */
  .cover-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 11in;
    gap: 0;
  }
  .cover-logo { width: 320px; margin-bottom: 1.5rem; }
  .cover-venue { font-family: var(--mono); font-size: 28px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .cover-venue span { color: var(--accent); }
  .cover-divider { width: 60px; height: 2px; background: var(--accent); margin: 1rem auto; }
  .cover-season { font-family: var(--mono); font-size: 16px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mid); margin-bottom: 0.25rem; }
  .cover-subtitle { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-ghost); }

  /* SECTION HEADER */
  .spec-section-header {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    border-bottom: 1px solid #1a1812;
    padding-bottom: 4px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* RECIPE COLUMNS */
  .recipe-columns {
    columns: 2;
    column-gap: 0.4in;
    column-fill: balance;
  }
  .recipe-block {
    break-inside: avoid;
    margin-bottom: 20px;
    page-break-inside: avoid;
  }
  .recipe-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .recipe-ingredients {
    list-style: none;
    margin-bottom: 5px;
  }
  .recipe-ingredients li {
    font-size: 11.5px;
    line-height: 1.65;
    color: #1a1812;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .ing-qty-label {
    min-width: 28px;
    flex-shrink: 0;
    text-align: left;
  }
  .recipe-method {
    font-size: 11px;
    color: var(--ink-mid);
    font-style: italic;
    margin-bottom: 2px;
  }
  .recipe-garnish {
    font-size: 11px;
    color: var(--ink-light);
  }
  .recipe-batch-note {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--accent);
    margin-top: 2px;
  }

  /* BAR PREP */
  .prep-columns {
    columns: 2;
    column-gap: 0.4in;
  }
  .prep-block {
    break-inside: avoid;
    margin-bottom: 18px;
    page-break-inside: avoid;
  }
  .prep-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
    border-bottom: 0.5px solid #c8c4bc;
    padding-bottom: 3px;
  }
  .prep-ingredients li {
    font-size: 11px;
    line-height: 1.7;
    color: #1a1812;
    list-style: none;
    display: flex;
    gap: 6px;
  }
  .prep-notes {
    font-size: 10.5px;
    color: var(--ink-mid);
    font-style: italic;
    margin-top: 4px;
    line-height: 1.5;
  }
  .prep-divider {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-ghost);
    margin: 12px 0 8px;
    padding-bottom: 3px;
    border-bottom: 0.5px dashed #c8c4bc;
  }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--ink); color: var(--parchment); padding: 10px 16px; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; border-left: 3px solid var(--accent); opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; z-index: 200; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* PRINT */
  @media print {
    .nav, .preview-ui > *:not(.print-area) { display: none !important; }
    .print-area { display: block !important; }
    .spec-page { margin: 0; padding: 0.6in 0.65in; page-break-after: always; box-shadow: none; border: none; }
    .spec-page:last-child { page-break-after: avoid; }
    .spec-page + .spec-page { border-top: none; }
  }
</style>
<style id="spec-dynamic-styles"></style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Hamlet <span>&</span> Ghost</div>
  <div class="nav-links">
    <a class="nav-link " href="index.html">Ingredients</a>
    <a class="nav-link " href="hamlet-ghost-recipes.html">Recipes</a>
    <a class="nav-link " href="hamlet-ghost-grid.html">Menu Grid</a>
    <a class="nav-link " href="hamlet-ghost-manager.html">Menu Manager</a>
    <a class="nav-link " href="hamlet-ghost-dashboard.html">Dashboard</a>
    <a class="nav-link active" href="hamlet-ghost-specsheet.html">Spec Sheet</a>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px;">
    <span id="nav-user" style="font-family:'DM Mono',monospace;font-size:10px;color:rgba(200,196,188,0.6);letter-spacing:0.04em;"></span>
    <button onclick="signOut()" style="font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(200,196,188,0.7);padding:0 12px;height:28px;border-radius:4px;cursor:pointer;">Sign out</button>
  </div>
</div>
</nav>

<div class="preview-ui" id="preview-ui">
  <div class="ui-header">
    <div>
      <div class="ui-title">Spec Sheet Export</div>
      <div class="ui-sub" id="spec-sub">Loading...</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" onclick="refreshPreview()"><i class="ti ti-refresh"></i> Refresh</button>
      <button class="btn" onclick="copySpecMarkdown()" title="Copy the sheet as Markdown for Google Docs (Edit → Paste from Markdown)"><i class="ti ti-clipboard-copy"></i> Copy Markdown</button>
      <button class="btn btn-accent" onclick="printSpec()"><i class="ti ti-printer"></i> Print / Save PDF</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:280px 1fr;gap:1.25rem;align-items:start;">

    <!-- SETTINGS PANEL -->
    <div>
      <div class="card">
        <div class="card-title">Menu</div>
        <div style="font-size:13px;font-weight:500;" id="active-menu-name">—</div>
        <div style="font-size:11px;color:var(--ink-light);margin-top:3px;" id="active-menu-meta">—</div>
        <div style="margin-top:10px;">
          <a href="hamlet-ghost-manager.html" style="font-size:11px;color:var(--ink-light);font-family:var(--mono);">Change active menu →</a>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Sections</div>
        <div class="section-list" id="section-list"></div>
      </div>

      <div class="card">
        <div class="card-title">Options</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
            <input type="checkbox" id="opt-cover" checked onchange="refreshPreview()"> Cover page
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
            <input type="checkbox" id="opt-barprep" checked onchange="refreshPreview()"> Bar prep page
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
            <input type="checkbox" id="opt-method" checked onchange="refreshPreview()"> Show method line
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
            <input type="checkbox" id="opt-garnish" checked onchange="refreshPreview()"> Show garnish
          </label>
        </div>
      </div>

      <div class="card" id="style-card">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
          Style
          <div style="display:flex;gap:6px;align-items:center;">
            <select id="style-preset-select" onchange="loadStylePreset(this.value)" style="font-family:var(--mono);font-size:10px;letter-spacing:0.04em;height:26px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);color:var(--ink);padding:0 4px;max-width:110px;">
              <option value="">Load preset…</option>
            </select>
            <button onclick="saveStylePreset()" class="btn" style="height:26px;padding:0 8px;font-size:10px;">Save</button>
          </div>
        </div>

        <div style="margin-bottom:12px;">
          <div style="font-size:10px;color:var(--ink-light);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;">Font family</div>
          <select id="st-font-family" onchange="updateStyle('fontFamily',this.value)" style="width:100%;height:30px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);color:var(--ink);font-size:12px;padding:0 6px;">
            <option value="DM Sans">DM Sans</option>
            <option value="DM Mono">DM Mono</option>
            <option value="Inter">Inter</option>
            <option value="EB Garamond">EB Garamond</option>
            <option value="Playfair Display">Playfair Display</option>
            <option value="Libre Baskerville">Libre Baskerville</option>
            <option value="Courier Prime">Courier Prime</option>
          </select>
        </div>

        <div style="margin-bottom:9px;">
          <div style="font-size:11px;font-weight:500;margin-bottom:3px;">Name</div>
          <div style="display:grid;grid-template-columns:46px 1fr 24px 1fr;gap:4px;align-items:center;">
            <input type="number" id="st-name-size" min="8" max="36" step="0.5" onchange="updateStyle('nameFontSize',+this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;width:100%;">
            <select id="st-name-weight" onchange="updateStyle('nameFontWeight',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <option value="300">Light</option><option value="400">Normal</option><option value="500">Medium</option><option value="700">Bold</option>
            </select>
            <input type="color" id="st-name-color" onchange="updateStyle('nameColor',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;width:24px;padding:2px;cursor:pointer;">
            <select id="st-name-transform" onchange="updateStyle('nameTransform',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <option value="none">None</option><option value="capitalize">Title</option><option value="uppercase">CAPS</option><option value="lowercase">lower</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom:9px;">
          <div style="font-size:11px;font-weight:500;margin-bottom:3px;">Ingredients</div>
          <div style="display:grid;grid-template-columns:46px 1fr 24px 1fr;gap:4px;align-items:center;">
            <input type="number" id="st-ing-size" min="8" max="36" step="0.5" onchange="updateStyle('ingFontSize',+this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;width:100%;">
            <select id="st-ing-weight" onchange="updateStyle('ingFontWeight',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <option value="300">Light</option><option value="400">Normal</option><option value="500">Medium</option><option value="700">Bold</option>
            </select>
            <input type="color" id="st-ing-color" onchange="updateStyle('ingColor',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;width:24px;padding:2px;cursor:pointer;">
            <select id="st-ing-transform" onchange="updateStyle('ingTransform',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <option value="none">None</option><option value="capitalize">Title</option><option value="uppercase">CAPS</option><option value="lowercase">lower</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom:9px;">
          <div style="font-size:11px;font-weight:500;margin-bottom:3px;">Method</div>
          <div style="display:grid;grid-template-columns:46px 1fr 24px 1fr;gap:4px;align-items:center;">
            <input type="number" id="st-method-size" min="8" max="36" step="0.5" onchange="updateStyle('methodFontSize',+this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;width:100%;">
            <select id="st-method-weight" onchange="updateStyle('methodFontWeight',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <option value="300">Light</option><option value="400">Normal</option><option value="500">Medium</option><option value="700">Bold</option>
            </select>
            <input type="color" id="st-method-color" onchange="updateStyle('methodColor',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;width:24px;padding:2px;cursor:pointer;">
            <select id="st-method-transform" onchange="updateStyle('methodTransform',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <option value="none">None</option><option value="capitalize">Title</option><option value="uppercase">CAPS</option><option value="lowercase">lower</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom:10px;">
          <div style="font-size:11px;font-weight:500;margin-bottom:3px;">Garnish</div>
          <div style="display:grid;grid-template-columns:46px 1fr 24px 1fr;gap:4px;align-items:center;">
            <input type="number" id="st-garnish-size" min="8" max="36" step="0.5" onchange="updateStyle('garnishFontSize',+this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;width:100%;">
            <select id="st-garnish-weight" onchange="updateStyle('garnishFontWeight',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <option value="300">Light</option><option value="400">Normal</option><option value="500">Medium</option><option value="700">Bold</option>
            </select>
            <input type="color" id="st-garnish-color" onchange="updateStyle('garnishColor',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;width:24px;padding:2px;cursor:pointer;">
            <select id="st-garnish-transform" onchange="updateStyle('garnishTransform',this.value)" style="height:27px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <option value="none">None</option><option value="capitalize">Title</option><option value="uppercase">CAPS</option><option value="lowercase">lower</option>
            </select>
          </div>
        </div>

        <div style="border-top:1px solid var(--border);padding-top:10px;">
          <div style="font-size:10px;color:var(--ink-light);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;">Layout</div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <div style="display:flex;gap:4px;">
              <button id="st-col-1" onclick="updateStyle('columns',1)" class="btn" style="height:26px;padding:0 10px;font-size:10px;">1 col</button>
              <button id="st-col-2" onclick="updateStyle('columns',2)" class="btn" style="height:26px;padding:0 10px;font-size:10px;">2 col</button>
            </div>
            <div style="display:flex;align-items:center;gap:4px;">
              <span style="font-size:11px;color:var(--ink-light);">Spacing</span>
              <input type="number" id="st-spacing" min="4" max="60" onchange="updateStyle('recipeSpacing',+this.value)" style="height:26px;width:44px;border:1px solid var(--border-mid);border-radius:4px;background:var(--parchment);font-size:11px;padding:0 4px;">
              <span style="font-size:10px;color:var(--ink-light);">px</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div>

<script>
// ─── SUPABASE CONFIG ─────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://qgfrzhvgrilgxygoxjcn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Eq6r-RQzxU13f2A1sf3vHw_VoXb9tav';
const LS_KEY = 'hg_app_data_v1';

// ─── SUPABASE CLIENT ─────────────────────────────────────────────────────────
async function sbRequest(method, path, body) {
  const session = await getValidSession();
  const headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${session ? session.access_token : SUPABASE_KEY}`
  };
  const res = await fetch(SUPABASE_URL + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return res.json().catch(() => null);
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function getSession() {
  const raw = localStorage.getItem('hg_session');
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}

// Returns a session with a live access token, refreshing via the refresh
// token first if it has expired (or is about to). Without this, a session
// silently stops syncing ~1hr after login: sbRequest falls back to the
// unauthenticated key, RLS rejects the write, and it's swallowed as a
// "cached locally" warning — this is a major source of saves that never
// make it to Supabase and then look like they were "overwritten."
let sessionRefresh = null;
async function getValidSession() {
  const session = getSession();
  if (!session) return null;
  if (session.expires_at && Date.now() / 1000 < session.expires_at - 60) return session;
  if (!session.refresh_token) { localStorage.removeItem('hg_session'); return null; }
  if (!sessionRefresh) {
    sessionRefresh = fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: session.refresh_token })
    }).then(async (res) => {
      if (!res.ok) { localStorage.removeItem('hg_session'); return null; }
      const data = await res.json();
      localStorage.setItem('hg_session', JSON.stringify(data));
      return data;
    }).catch(() => null).finally(() => { sessionRefresh = null; });
  }
  return sessionRefresh;
}

async function signIn(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'Sign in failed');
  localStorage.setItem('hg_session', JSON.stringify(data));
  return data;
}

async function signOut() {
  const session = getSession();
  if (session) {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${session.access_token}` }
    }).catch(() => {});
  }
  localStorage.removeItem('hg_session');
  showLoginScreen();
}

function requireAuth() {
  const session = getSession();
  if (!session) {
    showLoginScreen();
    return false;
  }
  return true;
}

// ─── DATA LAYER ───────────────────────────────────────────────────────────────
async function loadAppData() {
  // Try Supabase first
  try {
    const rows = await sbRequest('GET', `/rest/v1/app_data?id=eq.main&select=data`);
    if (rows && rows.length > 0 && rows[0].data) {
      const data = rows[0].data;
      // Update local cache
      localStorage.setItem(LS_KEY, JSON.stringify(data));
      return data;
    }
  } catch(e) {
    console.warn('Supabase load failed, using local cache:', e.message);
  }
  // Fallback to localStorage cache
  const cached = localStorage.getItem(LS_KEY);
  if (cached) return JSON.parse(cached);
  // Last resort: try old localStorage keys for migration
  return migrateFromOldKeys();
}

const PAGE_ID = 'specsheet';
function currentUserEmail() {
  try { const s = getSession(); return (s && s.user && s.user.email) || 'unknown'; }
  catch(e) { return 'unknown'; }
}
// Bump APP_BUILD and version.json together on every deploy. A tab on an older
// build than version.json is refused writes so a stale open tab can't overwrite.
const APP_BUILD = 3;
let appIsStale = false;
async function checkAppVersion() {
  try {
    const res = await fetch('version.json?ts=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const j = await res.json();
    if (typeof j.build === 'number' && j.build > APP_BUILD) { appIsStale = true; showStaleOverlay(j.build); }
  } catch(e) { /* fail open */ }
}
function showStaleOverlay(latest) {
  if (document.getElementById('stale-overlay')) return;
  const el = document.createElement('div');
  el.id = 'stale-overlay';
  el.style.cssText = 'position:fixed;inset:0;background:rgba(26,24,18,0.92);color:#f5f2ec;z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:"DM Mono",monospace;padding:2rem;';
  el.innerHTML = '<div style="font-size:15px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;">This page is out of date</div>'
    + '<div style="font-size:13px;max-width:420px;line-height:1.6;opacity:0.85;margin-bottom:1.5rem;">A newer version has been published (build ' + latest + '; this tab is build ' + APP_BUILD + '). To protect the data, saving is paused on this tab until you reload.</div>'
    + '<button onclick="location.reload(true)" style="background:#c8392b;color:#fff;border:none;border-radius:6px;padding:10px 22px;font-family:inherit;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;">Reload now</button>';
  document.body.appendChild(el);
}

// Authoritative read for saves — NO cache fallback. If we can't read the true
// server state we abort rather than write our change on top of stale data.
async function loadForSave() {
  const rows = await sbRequest('GET', `/rest/v1/app_data?id=eq.main&select=data`);
  if (!rows || !rows.length || !rows[0].data) throw new Error('empty server response');
  const data = rows[0].data;
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  return data;
}

function stampMeta(data, baseRev) {
  data._meta = { rev: (baseRev || 0) + 1, at: Date.now(), by: currentUserEmail(), from: PAGE_ID, build: APP_BUILD };
}
let casMode = 'auto';
async function patchRows(data, baseRev) {
  const session = await getValidSession();
  const headers = { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json',
    'Authorization': `Bearer ${session ? session.access_token : SUPABASE_KEY}`, 'Prefer': 'return=representation' };
  const cond = baseRev != null ? `&data->_meta->>rev=eq.${baseRev}` : '';
  const res = await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.main${cond}`, { method: 'PATCH', headers, body: JSON.stringify({ data }) });
  if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + (await res.text().catch(()=>'')).slice(0, 140));
  return res.json().catch(() => null);
}
async function writeBlob(data, baseRev) {
  stampMeta(data, baseRev);
  const useCond = casMode === 'auto' && baseRev != null;
  try {
    const rows = await patchRows(data, useCond ? baseRev : null);
    if (useCond && Array.isArray(rows) && rows.length === 0) return false;
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    return true;
  } catch(e) {
    if (useCond) { casMode = 'off'; await patchRows(data, null); localStorage.setItem(LS_KEY, JSON.stringify(data)); return true; }
    throw e;
  }
}

// Read-modify-write against authoritative state. mutate(data) edits a FRESH
// server copy and returns { onSuccess } to run only after the write is
// confirmed. Retries on a compare-and-swap conflict by re-reading & re-merging.
let pendingSaveRetry = null;
async function commitSave(mutate) {
  if (appIsStale) { showStaleOverlay(APP_BUILD + 1); throw new Error('app out of date'); }
  for (let attempt = 0; attempt < 5; attempt++) {
    let data;
    try { data = await loadForSave(); }
    catch(e) { pendingSaveRetry = () => commitSave(mutate); showUnsavedError('Not saved — can’t reach the server. Your last change is only on this screen. Keep this tab open and click Retry.'); throw e; }
    const baseRev = (data._meta && data._meta.rev) || 0;
    const result = mutate(data) || {};
    let ok;
    try { ok = await writeBlob(data, baseRev); }
    catch(e) { pendingSaveRetry = () => commitSave(mutate); showUnsavedError('Save failed — your last change did NOT save. Click Retry.'); throw e; }
    if (ok) { pendingSaveRetry = null; hideUnsavedError(); if (typeof result.onSuccess === 'function') result.onSuccess(); return data; }
  }
  // Exhausted CAS retries — either a genuine hot spot of concurrent edits, or the
  // conditional filter isn't discriminating on this backend. Disable CAS and do
  // one authoritative last-resort write so the change is never lost or stuck.
  casMode = 'off';
  try {
    const data = await loadForSave();
    const result = mutate(data) || {};
    await saveAppData(data);   // unconditional; stamps rev = serverRev+1
    pendingSaveRetry = null; hideUnsavedError();
    if (typeof result.onSuccess === 'function') result.onSuccess();
    return data;
  } catch(e) {
    pendingSaveRetry = () => commitSave(mutate);
    showUnsavedError('Save failed — your last change did NOT save. Click Retry.');
    throw e;
  }
}

// Unconditional stamped write — full-overwrite paths and CAS fallback.
async function saveAppData(data) {
  stampMeta(data, (data._meta && data._meta.rev) || 0);
  await patchRows(data, null);
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

// A failed save must be impossible to miss: a persistent red bar that stays up
// until a save actually succeeds. Retry re-runs the exact operation that failed
// (re-reading fresh server state) — never a stale cached payload.
function showUnsavedError(msg) {
  let el = document.getElementById('save-error-banner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'save-error-banner';
    el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#c8392b;color:#fff;font-family:"DM Mono",monospace;font-size:12px;letter-spacing:0.02em;padding:10px 16px;text-align:center;z-index:99999;box-shadow:0 -2px 12px rgba(0,0,0,0.25);';
    document.body.appendChild(el);
  }
  el.innerHTML = '⚠ <span id="save-error-msg"></span> <button id="save-error-retry" style="margin-left:10px;background:#fff;color:#c8392b;border:none;border-radius:4px;padding:3px 10px;font-family:inherit;font-size:11px;cursor:pointer;">Retry now</button>';
  el.querySelector('#save-error-msg').textContent = msg;
  document.getElementById('save-error-retry').onclick = () => { if (pendingSaveRetry) pendingSaveRetry().catch(()=>{}); };
}
function hideUnsavedError() {
  const el = document.getElementById('save-error-banner');
  if (el) el.remove();
}

checkAppVersion();
setInterval(checkAppVersion, 120000);

function migrateFromOldKeys() {
  // Migrate from old separate localStorage keys

      recipes: recipes ? JSON.parse(recipes) : [],
      menus: menus ? JSON.parse(menus) : [],
      importMeta: importMeta ? JSON.parse(importMeta) : null,
      salesData: salesData ? JSON.parse(salesData) : {}
    };
    console.log('Migrated data from old localStorage keys');
    return migrated;
  }
  return { spirits: [], otherIngredients: [], recipes: [], menus: [], importMeta: null, salesData: {} };
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let recipes = [];
let allRecipes = [];
let otherIngredients = [];
let spirits = [];
let activeMenu = null;
let menus = [];
let sections = [];
const NEGLIGIBLE = ['dash','barspoon','rinse'];

const DEFAULT_STYLE_CONFIG = {
  fontFamily: 'DM Sans',
  nameFontSize: 17, nameFontWeight: '700', nameColor: '#1a1812', nameTransform: 'capitalize',
  ingFontSize: 15, ingFontWeight: '400', ingColor: '#1a1812', ingTransform: 'capitalize',
  methodFontSize: 15, methodFontWeight: '700', methodColor: '#4a4640', methodTransform: 'capitalize',

  columns: 2,
  recipeSpacing: 20
};
let styleConfig = Object.assign({}, DEFAULT_STYLE_CONFIG, JSON.parse(localStorage.getItem('hg_spec_style') || 'null') || {});
let specStylePresets = [];

// Default sections
const DEFAULT_SECTIONS = [
  { id: 'cocktail-menu',    label: 'Cocktail Menu',         visible: true },
  { id: 'spirit-free',      label: 'Spirit Free Cocktails', visible: true },
  { id: 'martini-recipes',  label: 'Martini Recipes',       visible: true },
];

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (!requireAuth()) return;
  const session = getSession();
  if (session && session.user) {
    const el = document.getElementById('nav-user');

async function loadData() {
  const data = await loadAppData();
  spirits = data.spirits || [];
  otherIngredients = data.otherIngredients || [];
  allRecipes = data.recipes || [];
  menus = data.menus || [];
  specStylePresets = data.specStylePresets || [];
  renderPresetList();

  activeMenu = menus.find(m => m.isActive) || menus[0] || null;

  if (activeMenu) {
    const ids = new Set((activeMenu.recipeIds || []).map(r => r.id));
    recipes = allRecipes.filter(r => ids.has(r.id));
    document.getElementById('active-menu-name').textContent = activeMenu.name || '—';
    document.getElementById('active-menu-meta').textContent =
      `${recipes.length} cocktails · Created ${new Date(activeMenu.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
    document.getElementById('spec-sub').textContent = `${activeMenu.name} · ${recipes.filter(r=>r.recipeType!=='barprep').length} cocktails · ${allRecipes.filter(r=>r.recipeType==='barprep').length} bar prep items`;
  } else {
    recipes = allRecipes;
    document.getElementById('active-menu-name').textContent = 'No active menu';
    document.getElementById('spec-sub').textContent = 'Set an active menu in Menu Manager';
  }
}

function buildSections() {
  // Build sections from what's actually on the menu
  const menuRecipes = recipes.filter(r => r.recipeType !== 'barprep');
  // Get unique sections used in this menu
  const used = new Set();
  if (activeMenu) {
    (activeMenu.recipeIds || []).forEach(entry => {
      if (entry.section) used.add(entry.section);
    });
  }
  // Start with defaults, add any custom sections found
  sections = DEFAULT_SECTIONS.map(s => ({ ...s }));
  used.forEach(sec => {
    if (!sections.find(s => s.label === sec)) {
      sections.push({ id: sec.toLowerCase().replace(/\s+/g,'-'), label: sec, visible: true });
    }
  });
}

function renderSectionList() {
  const list = document.getElementById('section-list');
  list.innerHTML = sections.map((sec, i) => {
    const count = getRecipesForSection(sec.label).length;
    return `<div class="section-item">
      <i class="ti ti-grip-vertical section-handle"></i>
      <span class="section-name">${esc(sec.label)}</span>
      <span class="section-count">${count}</span>
      <div class="section-toggle ${sec.visible?'':'off'}" onclick="toggleSection(${i})"></div>
    </div>`;
  }).join('');
}

function toggleSection(i) {
  sections[i].visible = !sections[i].visible;
  renderSectionList();
  refreshPreview();
}

function getRecipesForSection(sectionLabel) {
  if (!activeMenu) return recipes.filter(r => r.recipeType !== 'barprep');
  return (activeMenu.recipeIds || [])
    .filter(entry => (entry.section || 'Cocktail Menu') === sectionLabel)
    .map(entry => allRecipes.find(r => r.id === entry.id))
    .filter(Boolean)
    .filter(r => r.recipeType !== 'barprep');
}

// Bar prep recipes that belong on the sheet (House Prep or referenced by an
// active-menu cocktail) plus house staples. Shared by the HTML renderer and
// the markdown export so the two can't drift apart.
function getBarPrepForSheet() {
  const usedBarPrepIds = new Set();
  recipes.filter(r => r.recipeType !== 'barprep').forEach(r => {
    (r.ingredients || []).forEach(ing => {
      if (ing.ingredientId) usedBarPrepIds.add(ing.ingredientId);
      if (ing.isBatchGroup) (ing.children || []).forEach(c => { if (c.ingredientId) usedBarPrepIds.add(c.ingredientId); });
    });
  });
  const barPrepRecipes = allRecipes.filter(r => r.recipeType === 'barprep' && (r.isHousePrep || usedBarPrepIds.has(r.id)));
  // Only genuine in-house prep prints as a "house staple" — syrups and
  // house-made solutions (Simple Syrup, Saline, etc.). Juices, garnishes,
  // dairy, and generic "Other" (fresh-squeezed juice, Cold Brew) are
  // ingredients, not bar prep, so they stay off the spec sheet even
  // though they have a notes field.
  const HOUSE_STAPLE_CATEGORIES = ['Syrup', 'House-made'];
  const houseStaples = otherIngredients.filter(o => HOUSE_STAPLE_CATEGORIES.includes(o.category));
  return { barPrepRecipes, houseStaples };
}

function renderSpecSheet(forPrint = false) {

  const menuName = activeMenu?.name || 'Menu';

  let html = `<div class="spec-wrap">`;

  // COVER PAGE

function renderRecipeBlock(r, showMethod, showGarnish) {
  const batchGroups = (r.ingredients || []).filter(i => i.isBatchGroup);
  return `<div class="recipe-block">
    <div class="recipe-name">${esc(r.name || 'Untitled')}</div>
    <ul class="recipe-ingredients">
      ${(r.ingredients || []).map(ing => {
        if (ing.isBatchGroup) {
          return `<li><span class="ing-qty-label"></span><span style="font-style:italic;color:#8a8680;">${esc(ing.batchName || 'Batch')}</span></li>`;
        }
        const qty = ing.qty ? formatQty(ing.qty, ing.unit) : '';
        const pour = ing.pourStyle === 'heavy' ? ' <span style="color:#c8392b;font-size:0.85em;">▲ heavy</span>' : ing.pourStyle === 'scant' ? ' <span style="color:#26608a;font-size:0.85em;">▼ scant</span>' : '';
        return `<li><span class="ing-qty-label">${esc(qty)}</span><span>${esc(ing.ingredientName || '')}${pour}</span></li>`;
      }).join('')}
    </ul>
    ${showMethod && (r.style || r.glass || r.ice) ? `<div class="recipe-method">${[r.style, r.glass, r.ice].filter(Boolean).join(', ')}</div>` : ''}
    ${showMethod && r.methodNotes ? `<div class="recipe-method">${esc(r.methodNotes)}</div>` : ''}
    ${showGarnish && r.garnish ? `<div class="recipe-garnish">${esc(r.garnish)}</div>` : ''}
    ${batchGroups.length > 0 ? `<div class="recipe-batch-note">⊞ Batched: ${batchGroups.map(b => esc(b.batchName)).join(', ')}</div>` : ''}
  </div>`;
}

function renderPrepBlock(r) {
  const ings = r.bpIngredients || [];
  const steps = r.bpSteps || [];
  const yieldSpan = r.bpYield ? '<span style="font-weight:400;color:#8a8680;font-size:10px;margin-left:8px;">' + esc(r.bpYield) + '</span>' : '';
  const stepsHtml = steps.length > 0
    ? '<ol style="margin-top:4px;padding-left:14px;">'
      + steps.map(s => '<li class="recipe-method" style="line-height:1.6;margin-bottom:0;">' + esc(s) + '</li>').join('')
      + '</ol>'
    : '';
  return '<div class="prep-block">'
    + '<div class="recipe-name">' + esc(r.name || 'Untitled') + yieldSpan + '</div>'
    + '<ul class="recipe-ingredients">'
    + ings.map(function(ing) {
        const qty = [ing.qty, ing.unit].filter(Boolean).join(' ');
        return '<li><span class="ing-qty-label">' + esc(qty) + '</span><span>' + esc(ing.name || '') + '</span></li>';
      }).join('')
    + '</ul>'
    + stepsHtml
    + (r.summary ? '<div class="recipe-garnish">' + esc(r.summary) + '</div>' : '')
    + '</div>';
}

function renderStapleBlock(o) {
  return '<div class="prep-block">'
    + '<div class="recipe-name">' + esc(o.name) + '</div>'
    + (o.notes ? '<div class="recipe-garnish">' + esc(o.notes) + '</div>' : '')
    + '</div>';
}

// ─── MARKDOWN EXPORT (Google Docs: Edit → Paste from Markdown) ───────────────
// Mirrors what's on the rendered sheet — same toggles, same section
// visibility, same qty formatting. Per-cocktail shape follows the house
// Google Doc format:
//   # **Name**  /  ## qty Ingredient  /  ### **Style, Glass, Ice**
//   ### **method notes**  /  #### **Garnish**
function buildSpecMarkdown() {
  const showBarPrep = document.getElementById('opt-barprep').checked;
  const showMethod = document.getElementById('opt-method').checked;
  const showGarnish = document.getElementById('opt-garnish').checked;
  const lines = [];

  // No cover/title block in the markdown — the Google Doc starts straight
  // at the drinks (cover toggle only affects the rendered/printed sheet).

  const visibleSections = sections.filter(s => s.visible).filter(s => getRecipesForSection(s.label).length > 0);
  visibleSections.forEach(sec => {
    if (visibleSections.length > 1) lines.push(`**${sec.label.toUpperCase()}**`, '');
    getRecipesForSection(sec.label).forEach(r => {
      lines.push(`# **${r.name || 'Untitled'}**`, '');
      (r.ingredients || []).forEach(ing => {
        if (ing.isBatchGroup) { lines.push(`## *${ing.batchName || 'Batch'}*`, ''); return; }
        const qty = ing.qty ? formatQty(ing.qty, ing.unit) : '';
        const pour = ing.pourStyle === 'heavy' ? ' [heavy]' : ing.pourStyle === 'scant' ? ' [scant]' : '';
        const line = ([qty, ing.ingredientName || ''].filter(Boolean).join(' ').trim() + pour).trim();
        if (line) lines.push(`## ${line}`, '');
      });
      if (showMethod && (r.style || r.glass || r.ice)) lines.push(`### **${[r.style, r.glass, r.ice].filter(Boolean).join(', ')}**`, '');
      if (showMethod && r.methodNotes) lines.push(`### **${r.methodNotes}**`, '');
      if (showGarnish && r.garnish) lines.push(`#### **${r.garnish}**`, '');
    });
  });

  if (showBarPrep) {
    const { barPrepRecipes, houseStaples } = getBarPrepForSheet();
    if (barPrepRecipes.length > 0 || houseStaples.length > 0) {
      lines.push('# **Bar Prep**', '');
      barPrepRecipes.forEach(r => {
        lines.push(`**${r.name || 'Untitled'}**${r.bpYield ? ` — ${r.bpYield}` : ''}`, '');
        (r.bpIngredients || []).forEach(ing => {
          const qty = [ing.qty, ing.unit].filter(Boolean).join(' ');
          const line = [qty, ing.name || ''].filter(Boolean).join(' ').trim();
          if (line) lines.push(`- ${line}`);
        });
        if ((r.bpIngredients || []).length) lines.push('');
        (r.bpSteps || []).forEach((s, i) => lines.push(`${i + 1}. ${s}`));
        if ((r.bpSteps || []).length) lines.push('');
        if (r.summary) lines.push(`*${r.summary}*`, '');
      });
      houseStaples.forEach(o => {
        lines.push(`**${o.name}**${o.notes ? ` — ${o.notes}` : ''}`, '');
      });
    }
  }

  return lines.join('\n').replace(/\n{3,}/g, '\n\n').trim() + '\n';
}

async function copySpecMarkdown() {
  const md = buildSpecMarkdown();
  try {
    await navigator.clipboard.writeText(md);
    showToast('✓ Copied — in Google Docs use Edit → Paste from Markdown');
  } catch (e) {
    // Clipboard API can be blocked (permissions/older browsers) — fall back
    // to a hidden textarea + execCommand.
    const ta = document.createElement('textarea');
    ta.value = md;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      showToast('✓ Copied — in Google Docs use Edit → Paste from Markdown');
    } catch (e2) {
      showToast('Copy failed — your browser blocked clipboard access');
    }
    ta.remove();
  }
}

function formatQty(qty, unit) {
  const n = parseFloat(qty);
  if (!n) return '';
  const u = unit || 'oz';
  const s = n < 1 ? n.toString().replace('0.', '.') : n.toString();
  if (u === 'dash') return `${s} dash${n !== 1 ? 'es' : ''}`;
  if (u === 'barspoon') return `${s} barspoon${n !== 1 ? 's' : ''}`;
  if (u === 'whole') return s;
  if (u === 'rinse') return 'rinse';
  if (u === 'ml') return `${s} ml`;
  if (u === 'oz') return s;
  return `${s} ${u}`;
}

function buildSpecDynamicCSS() {
  const fontMap = {
    'DM Sans': "'DM Sans',sans-serif",
    'DM Mono': "'DM Mono',monospace",
    'Inter': "'Inter',sans-serif",
    'EB Garamond': "'EB Garamond',serif",
    'Playfair Display': "'Playfair Display',serif",
    'Libre Baskerville': "'Libre Baskerville',serif",
    'Courier Prime': "'Courier Prime',monospace"
  };
  const ff = fontMap[styleConfig.fontFamily] || "'DM Sans',sans-serif";
  return '.spec-wrap{font-family:' + ff + ';}'
    + '.recipe-name{font-size:' + styleConfig.nameFontSize + 'px;font-weight:' + styleConfig.nameFontWeight + ';color:' + styleConfig.nameColor + ';text-transform:' + styleConfig.nameTransform + ';}'
    + '.recipe-ingredients li{font-size:' + styleConfig.ingFontSize + 'px;font-weight:' + styleConfig.ingFontWeight + ';color:' + styleConfig.ingColor + ';text-transform:' + styleConfig.ingTransform + ';}'
    + '.recipe-method{font-size:' + styleConfig.methodFontSize + 'px;font-weight:' + styleConfig.methodFontWeight + ';color:' + styleConfig.methodColor + ';text-transform:' + styleConfig.methodTransform + ';}'
    + '.recipe-garnish{font-size:' + styleConfig.garnishFontSize + 'px;font-weight:' + styleConfig.garnishFontWeight + ';color:' + styleConfig.garnishColor + ';text-transform:' + styleConfig.garnishTransform + ';}'
    + '.recipe-columns{columns:' + styleConfig.columns + ';}'
    + '.recipe-block{margin-bottom:' + styleConfig.recipeSpacing + 'px;}';
}

function refreshDynamicStyles() {
  const el = document.getElementById('spec-dynamic-styles');
  if (el) el.textContent = buildSpecDynamicCSS();
}

function updateStyle(key, val) {
  styleConfig[key] = val;
  localStorage.setItem('hg_spec_style', JSON.stringify(styleConfig));
  refreshDynamicStyles();
  renderStylePanel();
  refreshPreview();
}

function renderStylePanel() {
  const fields = {
    'st-font-family': styleConfig.fontFamily,
    'st-name-size': styleConfig.nameFontSize,
    'st-name-weight': styleConfig.nameFontWeight,
    'st-name-color': styleConfig.nameColor,
    'st-name-transform': styleConfig.nameTransform,
    'st-ing-size': styleConfig.ingFontSize,
    'st-ing-weight': styleConfig.ingFontWeight,
    'st-ing-color': styleConfig.ingColor,
    'st-ing-transform': styleConfig.ingTransform,
    'st-method-size': styleConfig.methodFontSize,
    'st-method-weight': styleConfig.methodFontWeight,
    'st-method-color': styleConfig.methodColor,
    'st-method-transform': styleConfig.methodTransform,
    'st-garnish-size': styleConfig.garnishFontSize,
    'st-garnish-weight': styleConfig.garnishFontWeight,
    'st-garnish-color': styleConfig.garnishColor,
    'st-garnish-transform': styleConfig.garnishTransform,
    'st-spacing': styleConfig.recipeSpacing
  };
  Object.keys(fields).forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.value = fields[id];
  });
  const c1 = document.getElementById('st-col-1');
  const c2 = document.getElementById('st-col-2');
  if (c1 && c2) {
    c1.className = styleConfig.columns === 1 ? 'btn btn-primary' : 'btn';

    c2.style.cssText = 'height:26px;padding:0 10px;font-size:10px;';

}

function renderPresetList() {

  if (!sel) return;
  const curVal = sel.value;
  sel.innerHTML = '<option value="">Load preset…</option>';
  specStylePresets.forEach(function(p) {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name;
    if (p.id === curVal) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function saveStylePreset() {
  const name = prompt('Preset name:');
  if (!name || !name.trim()) return;
  const id = 'sp_' + Date.now();
  const newPreset = { id: id, name: name.trim(), config: Object.assign({}, styleConfig) };
  // Append onto the freshly-loaded list (not the possibly-stale local one)
  // so a preset added from another tab in the meantime isn't clobbered.
  try {
    await commitSave((data) => {
      const merged = [...(data.specStylePresets || []), newPreset];
      data.specStylePresets = merged;
      return { onSuccess: () => { specStylePresets = merged; } };
    });
  } catch(e) {
    return; // failure surfaced by banner
  }
  renderPresetList();
  showToast('Preset saved: ' + name.trim());
}

function loadStylePreset(id) {
  if (!id) return;
  const preset = specStylePresets.find(function(p) { return p.id === id; });
  if (!preset) return;
  styleConfig = Object.assign({}, DEFAULT_STYLE_CONFIG, preset.config);
  localStorage.setItem('hg_spec_style', JSON.stringify(styleConfig));
  refreshDynamicStyles();
  renderStylePanel();
  refreshPreview();
  showToast('Loaded: ' + preset.name);
}

// ─── PREVIEW / PRINT ─────────────────────────────────────────────────────────
function refreshPreview() {
  const content = document.getElementById('preview-content');
  const html = renderSpecSheet(false);
  content.innerHTML = `<div style="transform:scale(0.65);transform-origin:top left;width:153%;background:#e8e4db;padding:20px;">${html}</div>`;
}

      .cover-divider{width:60px;height:2px;background:#c8392b;margin:1rem auto;}

      .cover-subtitle{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#c8c4bc;margin-top:6px;}

function switchTab(tab) {
  document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
  document.getElementById('tab-print').classList.toggle('active', tab === 'print');
  const content = document.getElementById('preview-content');
  if (tab === 'preview') {
    content.style.padding = '1rem';
    refreshPreview();
  } else {
    content.style.padding = '0';
    content.innerHTML = `<div style="background:#e8e4db;padding:20px;">${renderSpecSheet(false)}</div>`;
  }
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
